server:
  port: 8080

spring:
  application:
    name: api-gateway
  config:
    import: configserver:http://localhost:8888
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/auth/**

        - id: account-service
          uri: lb://ACCOUNT-SERVICE
          predicates:
            - Path=/accounts/**

        - id: transaction-service
          uri: lb://TRANSACTION-SERVICE
          predicates:
            - Path=/transactions/**

        - id: loan-service
          uri: lb://LOAN-SERVICE
          predicates:
            - Path=/loans/**

        - id: audit-service
          uri: lb://AUDIT-SERVICE
          predicates:
            - Path=/audit/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/